server:
  port: ${ADMIN_PORT:9090}
spring:
  application:
    name: admin-server
  config:
    import: optional:file:.env[.properties],optional:file:../.env[.properties]

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true