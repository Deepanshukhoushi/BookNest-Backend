name: BookNest Backend CI/CD

on:
  push:
    branches:
      - service/api-gateway
  pull_request:
    branches:
      - service/api-gateway

jobs:
  test-and-analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test
        run: mvn clean test -DskipTests

      - name: SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: mvn sonar:sonar -Dsonar.token=${{ secrets.SONAR_TOKEN }} -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}

  deploy:
    needs: test-and-analyze
    if: github.ref == 'refs/heads/service/api-gateway'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Create project directory if it doesn't exist
            mkdir -p ~/booknest-app
            cd ~/booknest-app

            # Clone or Pull Backend
            if [ ! -d "booknest-backend" ]; then
              git clone https://github.com/deepanshusingh-25/Booknest-Backend.git booknest-backend
            fi
            cd booknest-backend
            git checkout service/api-gateway
            git pull origin service/api-gateway
            
            # Start the containers
            docker-compose up -d --build
