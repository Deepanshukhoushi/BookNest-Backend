<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Update - BookNest</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f4f4f4; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #333333; line-height: 1.6;">
    <table border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width: 600px; margin: 40px auto; background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
        <tr>
            <td align="center" style="padding: 30px 0; background-color: #800020;">
                <div style="font-size: 24px; font-weight: bold; color: #ffffff; letter-spacing: 2px;">BOOKNEST</div>
            </td>
        </tr>
        <tr>
            <td style="padding: 40px 30px;">
                <h1 style="font-size: 22px; color: #800020; margin: 0 0 20px 0;">Order Status Update</h1>
                <p style="margin: 0 0 20px 0;">Hello <span th:text="${customerName}">Customer</span>,</p>
                <p style="margin: 0 0 20px 0;">Great news! The status of your order <strong>#<span th:text="${orderID}">12345</span></strong> has been updated.</p>
                
                <div style="background-color: #fdfdfd; border-left: 4px solid #800020; padding: 20px; margin: 30px 0; border-radius: 4px;">
                    <p style="margin: 0; font-size: 14px; color: #777; text-transform: uppercase; letter-spacing: 1px;">Current Status</p>
                    <p style="margin: 5px 0 0 0; font-size: 24px; font-weight: bold; color: #333;" th:text="${status}">SHIPPED</p>
                </div>

                <p style="margin: 0 0 30px 0;" th:text="${message}">Your order has been dispatched and is on its way to you.</p>
                
                <div style="text-align: center;">
                    <a href="http://51.20.183.56.nip.io/order-history" style="background-color: #800020; color: #ffffff; padding: 12px 25px; text-decoration: none; border-radius: 30px; font-weight: 600; display: inline-block;">View Order Details</a>
                </div>
            </td>
        </tr>
        <tr>
            <td style="padding: 20px; background-color: #fafafa; text-align: center; font-size: 12px; color: #999; border-top: 1px solid #eeeeee;">
                <p style="margin: 0;">&copy; 2026 BookNest Library. All rights reserved.</p>
            </td>
        </tr>
    </table>
</body>
</html>
