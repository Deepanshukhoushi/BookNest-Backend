<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Alert - BookNest</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #1c1e21; line-height: 1.6;">
    <table border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width: 600px; margin: 40px auto; background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.12);">
        <tr>
            <td align="center" style="padding: 20px 0; background-color: #1c1e21;">
                <div style="font-size: 20px; font-weight: bold; color: #ffffff; letter-spacing: 3px;">BOOKNEST ADMIN</div>
            </td>
        </tr>
        <tr>
            <td style="padding: 40px 30px;">
                <div style="display: inline-block; padding: 4px 12px; background-color: #fff3cd; color: #856404; border-radius: 4px; font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 15px;" th:text="${alertType}">SYSTEM ALERT</div>
                
                <h1 style="font-size: 24px; color: #1c1e21; margin: 0 0 20px 0;" th:text="${subject}">New Administrative Event</h1>
                
                <p style="margin: 0 0 25px 0;">Hello <span th:text="${adminName}">Admin</span>,</p>
                
                <div style="background-color: #f8f9fa; border: 1px solid #e9ecef; border-radius: 6px; padding: 25px; margin-bottom: 30px;">
                    <p style="margin: 0; font-size: 16px; color: #4b4f56;" th:text="${message}">A new system event has been recorded that requires your attention.</p>
                </div>

                <div style="text-align: center;">
                    <a href="http://51.20.183.56.nip.io/admin" style="background-color: #007bff; color: #ffffff; padding: 12px 30px; text-decoration: none; border-radius: 6px; font-weight: 600; display: inline-block;">Access Admin Dashboard</a>
                </div>
            </td>
        </tr>
        <tr>
            <td style="padding: 20px; background-color: #f0f2f5; text-align: center; font-size: 11px; color: #90949c;">
                <p style="margin: 0;">Automated System Notification &bull; BookNest Operations</p>
            </td>
        </tr>
    </table>
</body>
</html>
