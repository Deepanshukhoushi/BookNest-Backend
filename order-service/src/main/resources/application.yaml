server:
  port: ${ORDER_PORT:8084}
  forward-headers-strategy: framework

spring:
  application:
    name: order-service
  cloud:
    stream:
      bindings:
        order-out-0:
          destination: order-events
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    connection-timeout: 10000
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 3000
          max-attempts: 5
  config:
    import: optional:file:.env[.properties],optional:file:../.env[.properties]
  datasource:
    url: ${ORDER_DB_URL:jdbc:mysql://localhost:3306/booknest_order?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${ORDER_DB_USERNAME:root}
    password: ${ORDER_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env
  endpoint:
    health:
      show-details: always
  health:
    rabbit:
      enabled: true   # keep it visible but...
    # Treat rabbit as non-critical: service stays UP even if rabbit resets briefly
    livenessState:
      enabled: true
    readinessState:
      enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html
    try-it-out-enabled: true
    operations-sorter: method

razorpay:
  key:
    id: ${RAZORPAY_KEY_ID:}
    secret: ${RAZORPAY_KEY_SECRET:}
  webhook:
    secret: ${RAZORPAY_WEBHOOK_SECRET:}
